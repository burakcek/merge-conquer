<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Merge & Conquer</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
  * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
  body {
    background: #0f0f1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    touch-action: manipulation;
  }
  #game {
    max-width: 480px;
    width: 100%;
    padding: 16px;
    background: #16162a;
    border-radius: 24px;
    box-shadow: 0 0 40px rgba(100,150,255,0.1);
    border: 1px solid #2a2a4a;
  }
  #top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #aac8ff;
    font-size: 15px;
    font-weight: 600;
    padding-bottom: 8px;
    border-bottom: 1px solid #2a2a4a;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 6px;
  }
  #top span { color: #f5d742; }
  .btn {
    background: #2a2a4a;
    border: 1px solid #4a4a7a;
    color: #aac8ff;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    transition: 0.2s;
  }
  .btn:hover { background: #3a3a6a; }
  #grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    margin: 12px 0;
  }
  .cell {
    aspect-ratio: 1 / 1;
    background: #1e1e36;
    border-radius: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    cursor: pointer;
    transition: 0.15s;
    border: 2px solid transparent;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.4);
    position: relative;
  }
  .cell.selected { border-color: #f5d742; box-shadow: 0 0 20px rgba(245,215,66,0.3); }
  .cell.has-unit { background: #25254a; }
  .cell .level {
    font-size: 13px;
    position: absolute;
    bottom: 2px;
    right: 6px;
    color: #8ab4f8;
    opacity: 0.6;
  }
  .cell.lv1 { background: #2a4a6a; }
  .cell.lv2 { background: #2a6a4a; }
  .cell.lv3 { background: #6a4a2a; }
  .cell.lv4 { background: #4a2a6a; }
  .cell.lv5 { background: #6a2a4a; }
  .cell.lv6 { background: #2a6a6a; }
  .cell.lv7 { background: #6a4a6a; }
  .cell.lv8 { background: #4a6a2a; }
  .cell.lv9 { background: #6a2a2a; }
  .cell.lv10 { background: #2a2a6a; }

  #info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    color: #8ab4f8;
    margin: 6px 0 12px 0;
    flex-wrap: wrap;
    gap: 6px;
  }
  #info .stat { background: #1a1a32; padding: 4px 12px; border-radius: 30px; }
  #shop {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin: 8px 0;
  }
  .shop-btn {
    background: #2a2a4a;
    border: 1px solid #4a4a7a;
    color: #aac8ff;
    padding: 8px 16px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
    flex: 1;
    min-width: 80px;
  }
  .shop-btn:hover { background: #3a3a6a; }
  .shop-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  #prestige-area {
    margin-top: 12px;
    padding: 12px;
    background: #1a1a32;
    border-radius: 16px;
    border: 1px solid #2a2a4a;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  #prestige-area .label { color: #8ab4f8; font-size: 13px; }
  #prestige-area .value { color: #f5d742; font-weight: 700; }

  @media (max-width: 480px) {
    .cell { font-size: 18px; }
    .shop-btn { font-size: 12px; padding: 6px 12px; }
  }
</style>
</head>
<body>
<div id="game">

  <div id="top">
    <div>🪙 <span id="goldDisplay">0</span></div>
    <div>⚡ <span id="productionDisplay">0</span>/s</div>
    <button class="btn" id="resetBtn">⟳</button>
  </div>

  <div id="grid"></div>

  <div id="info">
    <div class="stat">📦 <span id="unitCount">0</span></div>
    <div class="stat">🏆 <span id="prestigeLevel">0</span></div>
    <div class="stat">🎯 <span id="totalGold">0</span></div>
  </div>

  <div id="shop">
    <button class="shop-btn" id="buyUnit">🛡️ Buy Soldier (50)</button>
  </div>

  <div id="prestige-area">
    <div>
      <div class="label">🌟 Prestige</div>
      <div class="value" id="prestigeBonus">+0%</div>
    </div>
    <button class="btn" id="prestigeBtn" style="background:#4a2a6a; border-color:#6a4a8a;">🔄 Reset (Prestige)</button>
  </div>

</div>

<script>
// ─── SOUND SYSTEM ─────────────────────────────────────────────
// These are the paths to your sound files in the 'sounds/' folder.
const sound = {
  merge: new Audio('sounds/merge.mp3'),
  buy: new Audio('sounds/buy.mp3'),
  prestige: new Audio('sounds/prestige.mp3'),
  click: new Audio('sounds/click.mp3'),
  error: new Audio('sounds/error.mp3'),
};

// Preload sounds (optional, helps with responsiveness)
Object.values(sound).forEach(audio => audio.load());

// ─── GAME STATE ──────────────────────────────────────────────
const GRID_SIZE = 5;
const MAX_LEVEL = 10;
let grid = [];
let gold = 0;
let totalGoldEarned = 0;
let prestigeLevel = 0;
let prestigeBonus = 1;
let selectedCell = null;
let production = 0;

// ─── HELPERS ──────────────────────────────────────────────────
function playSound(name) {
  const audio = sound[name];
  if (audio) {
    audio.currentTime = 0;
    audio.play().catch(() => {}); // ignore errors (e.g., if file missing)
  }
}

// ─── INIT ──────────────────────────────────────────────────────
function initGrid() {
  grid = [];
  for (let r = 0; r < GRID_SIZE; r++) {
    grid[r] = [];
    for (let c = 0; c < GRID_SIZE; c++) {
      grid[r][c] = { level: 0, unit: null };
    }
  }
  for (let i = 0; i < 3; i++) {
    const empty = findEmptyCell();
    if (empty) {
      const { row, col } = empty;
      grid[row][col].level = 1;
      grid[row][col].unit = { level: 1 };
    }
  }
  calculateProduction();
  render();
}

function findEmptyCell() {
  const empties = [];
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      if (grid[r][c].level === 0) empties.push({ row: r, col: c });
    }
  }
  if (empties.length === 0) return null;
  return empties[Math.floor(Math.random() * empties.length)];
}

function calculateProduction() {
  let total = 0;
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const lv = grid[r][c].level;
      if (lv > 0) total += lv * 2;
    }
  }
  production = total * prestigeBonus;
  updateUI();
}

function tryMerge(row1, col1, row2, col2) {
  if (row1 === row2 && col1 === col2) return false;
  const cell1 = grid[row1][col1];
  const cell2 = grid[row2][col2];
  if (cell1.level === 0 || cell2.level === 0) return false;
  if (cell1.level !== cell2.level) return false;
  if (cell1.level >= MAX_LEVEL) return false;
  const newLevel = cell1.level + 1;
  cell1.level = 0;
  cell1.unit = null;
  cell2.level = newLevel;
  cell2.unit = { level: newLevel };
  gold += newLevel * 2;
  totalGoldEarned += newLevel * 2;
  // Play merge sound
  playSound('merge');
  calculateProduction();
  render();
  return true;
}

function buyUnit() {
  const cost = 50;
  if (gold < cost) {
    playSound('error');
    return;
  }
  const empty = findEmptyCell();
  if (!empty) {
    playSound('error');
    return;
  }
  gold -= cost;
  grid[empty.row][empty.col].level = 1;
  grid[empty.row][empty.col].unit = { level: 1 };
  playSound('buy');
  calculateProduction();
  render();
}

function performPrestige() {
  if (totalGoldEarned < 1000) {
    alert('Need at least 1000 total gold to prestige.');
    playSound('error');
    return;
  }
  prestigeLevel++;
  prestigeBonus = 1 + prestigeLevel * 0.05;
  gold = 0;
  totalGoldEarned = 0;
  initGrid();
  calculateProduction();
  render();
  playSound('prestige');
  alert(`Prestige successful! Bonus: +${Math.round((prestigeBonus-1)*100)}%`);
}

function render() {
  const gridEl = document.getElementById('grid');
  gridEl.innerHTML = '';
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      const lv = grid[r][c].level;
      if (lv > 0) {
        cell.classList.add('has-unit', `lv${lv}`);
        cell.textContent = getEmoji(lv);
        const levelSpan = document.createElement('span');
        levelSpan.className = 'level';
        levelSpan.textContent = lv;
        cell.appendChild(levelSpan);
      } else {
        cell.textContent = '▢';
        cell.style.color = '#2a2a4a';
      }
      if (selectedCell && selectedCell.row === r && selectedCell.col === c) {
        cell.classList.add('selected');
      }
      cell.dataset.row = r;
      cell.dataset.col = c;
      cell.addEventListener('click', () => onCellClick(r, c));
      gridEl.appendChild(cell);
    }
  }
  document.getElementById('goldDisplay').textContent = Math.floor(gold);
  document.getElementById('productionDisplay').textContent = (production).toFixed(1);
  document.getElementById('unitCount').textContent = countUnits();
  document.getElementById('prestigeLevel').textContent = prestigeLevel;
  document.getElementById('totalGold').textContent = Math.floor(totalGoldEarned);
  document.getElementById('prestigeBonus').textContent = `+${Math.round((prestigeBonus-1)*100)}%`;
}

function getEmoji(level) {
  const emojis = ['', '⚔️', '🛡️', '🗡️', '🏹', '🔥', '⚡', '💎', '🌟', '👑', '🚀'];
  return emojis[level] || '⚔️';
}

function countUnits() {
  let count = 0;
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      if (grid[r][c].level > 0) count++;
    }
  }
  return count;
}

function onCellClick(row, col) {
  playSound('click'); // play click sound on any cell tap
  const lv = grid[row][col].level;
  if (lv === 0) { selectedCell = null; render(); return; }
  if (selectedCell === null) { selectedCell = { row, col }; render(); return; }
  if (selectedCell.row === row && selectedCell.col === col) { selectedCell = null; render(); return; }
  const success = tryMerge(selectedCell.row, selectedCell.col, row, col);
  selectedCell = null;
  if (!success) { selectedCell = { row, col }; render(); } else { render(); }
}

function updateUI() {
  document.getElementById('goldDisplay').textContent = Math.floor(gold);
  document.getElementById('productionDisplay').textContent = (production).toFixed(1);
  document.getElementById('unitCount').textContent = countUnits();
  document.getElementById('totalGold').textContent = Math.floor(totalGoldEarned);
  document.getElementById('prestigeBonus').textContent = `+${Math.round((prestigeBonus-1)*100)}%`;
}

// ─── GAME LOOP (idle gold) ────────────────────────────────────
let lastTick = Date.now();
function gameLoop() {
  const now = Date.now();
  const delta = (now - lastTick) / 1000;
  lastTick = now;
  if (delta > 0 && !isNaN(delta) && delta < 1) {
    const earn = production * delta;
    gold += earn;
    totalGoldEarned += earn;
  }
  updateUI();
  requestAnimationFrame(gameLoop);
}

// ─── EVENT LISTENERS ──────────────────────────────────────────
document.getElementById('buyUnit').addEventListener('click', buyUnit);
document.getElementById('prestigeBtn').addEventListener('click', performPrestige);
document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm('Reset game?')) {
    initGrid();
    gold = 0; totalGoldEarned = 0; prestigeLevel = 0; prestigeBonus = 1;
    selectedCell = null;
    calculateProduction();
    render();
  }
});

// ─── START ─────────────────────────────────────────────────────
initGrid();
gameLoop();

// ─── PWA SERVICE WORKER REGISTRATION ─────────────────────────
if ('serviceWorker' in navigator) {
  // Change the path below to match your repo name!
  // If your repo is 'merge-conquer', keep as is; if different, change.
  const swPath = '/merge-conquer/sw.js';
  navigator.serviceWorker.register(swPath)
    .then(() => console.log('✅ SW registered'))
    .catch(err => console.log('❌ SW registration failed:', err));
}
</script>
</body>
</html>
